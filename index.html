.chat-messages{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;background:#f7f9fc}
.msg{display:flex;gap:8px;max-width:90%;animation:fadeUp .18s ease}

.msg-av img{width:24px;height:24px;object-fit:contain}
.msg-av i{color:#003366;font-size:13px}

function getSystemPrompt() {

  }

    var prods2 = BRANDS.akademi.depts.egitimler.products[lang];

function handleQR(text) {
  var isQuote = text.toLowerCase().indexOf('teklif') > -1 || text.toLowerCase().indexOf('quote') > -1;

  if (dept === 'pilot' && isQuote) { startTeklifFlow(); return; }
  if (isQuote) showInput();

  if (dept === 'hasar') {
    var d = BRANDS.sigorta.depts.hasar;
    var openBtns = d.openInput || [];
    var prods = d.products ? d.products[lang] : null;
    if (prods && prods[text]) {
      selectedProduct = text; renderQR();
      addBot(prods[text].replace(/\n/g,'<br>'));
      if (openBtns.indexOf(text) > -1) showInput();
      return;
    }
    if (openBtns.indexOf(text) > -1) showInput();
  }

  if (brand === 'akademi' && dept === 'egitimler') {
    var prods2 = BRANDS.akademi.depts.egitimler.products[lang];
    if (prods2 && prods2[text]) {
      selectedProduct = text; renderQR(); addUser(text);
      chatHistory.push({role:'user',content:text});
      callAPI(getSystemPrompt(), [{role:'user',content:text}]);
      return;
    }
  }

  if (dept === 'elementer') {
    var prods3 = BRANDS.sigorta.depts.elementer.products[lang];
    if (prods3 && prods3[text]) {
      selectedProduct = text; renderQR(); addUser(text);
      chatHistory.push({role:'user',content:text});
      callAPI(getSystemPrompt(), [{role:'user',content:text}]);
      return;
    }
  }

  if (dept === 'ucus_oncesi') {
    var basSehir = {tr:'Başka bir şehir girin', en:'Enter another city', ru:'Введите другой город', de:'Andere Stadt eingeben', fr:'Entrer une autre ville', es:'Ingrese otra ciudad', it:'Inserisci un\'altra città'};
    if (text === basSehir[lang] || text === basSehir['en'] || text === basSehir['tr']) {
      showInput();
      var placeholders2 = {tr:'Şehir veya ülke adı yazın...', en:'Enter city or country name...', ru:'Введите город или страну...', de:'Stadt oder Land eingeben...', fr:'Entrez la ville ou le pays...', es:'Ingrese ciudad o país...', it:'Inserisci città o paese...'};
      document.getElementById('input').placeholder = placeholders2[lang] || placeholders2['en'];
      return;
    }
    showInput();
    send(text);
    return;
  }

  send(text);
  // Fit to Fly Cabin seçilince ses oynatıcı ekle
  if (text === 'Fit to Fly Cabin') {
    setTimeout(function() {
      var msgs = document.getElementById('messages');
      var d = document.createElement('div');
      d.className = 'msg bot';
      d.innerHTML = '<div class="msg-av"><img src="/images.png" alt="Nova"/></div>'
        + '<div class="msg-bubble" style="padding:10px 12px">'
        + '<div style="font-size:11px;font-weight:700;color:#003366;margin-bottom:8px;letter-spacing:.5px">🎙️ POLİÇE AÇIKLAMASI</div>'
        + '<audio controls style="width:100%;height:36px;outline:none;border-radius:8px" preload="metadata">'
        + '<source src="/public/cabin.mp3" type="audio/mpeg">'
        + '</audio>'
        + '</div>';
      msgs.appendChild(d);
      msgs.scrollTop = msgs.scrollHeight;
    }, 100);
  }
}

async function callAPI(sysPrompt, msgs) {
  if (busy) return;
  busy = true;
  document.getElementById('send-btn').disabled = true;
  showTyping();
  try {
    var maxTok = (dept === 'ucus_oncesi') ? 2000 : 1000;
    var res = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        system: sysPrompt,
        messages: msgs,
        max_tokens: maxTok
      })
    });
    var data = await res.json();
    if (!res.ok) {
      console.error('API response error:', data);
      throw new Error(data.error || 'API error ' + res.status);
    }
    // Proxy Anthropic formatı döndürüyor: content[0].text
    var reply = data.content && data.content[0] ? data.content[0].text : null;
    if (!reply) throw new Error('Empty response');
    chatHistory.push({role:'assistant',content:reply});
    removeTyping();
    addBot(reply);
  } catch(e) {
    removeTyping();
    console.error('API Error:', e);
    addBot(lang === 'tr' ? 'Üzgünüm, bir bağlantı hatası oluştu. Lütfen tekrar deneyin.' : 'Sorry, a connection error occurred. Please try again.');
  }
  busy = false;
  document.getElementById('send-btn').disabled = false;
}

function send(text) {
  if (!text.trim()) return;
  addUser(text);
  chatHistory.push({role:'user',content:text});
  callAPI(getSystemPrompt(), chatHistory);
}

function sendMessage() {
  var inp = document.getElementById('input');

  if (!t) return;
  inp.value = '';
  inp.style.height = 'auto';
  if (teklifState && teklifState.step) { addUser(t); handleTeklifInput(t); return; }
  send(t);
}

function handleTeklifInput(text) {
  var t = text.trim().toLowerCase();
  if (teklifState.step === 'meslek') {
    if (t.indexOf('pilot') > -1) teklifState.meslek = 'pilot';
    else if (t.indexOf('kabin') > -1 || t.indexOf('teknik') > -1) teklifState.meslek = 'kabin';
    else { addBot('Lütfen <b>Pilot</b>, <b>Kabin</b> veya <b>Teknik</b> yazın.'); return; }
    teklifState.step = 'cinsiyet';
    document.getElementById('input').placeholder = 'Kadın / Erkek yazın...';
    addBot('Cinsiyetiniz nedir?<br>👩 <b>Kadın</b><br>👨 <b>Erkek</b>');
    return;
  }
  if (teklifState.step === 'cinsiyet') {
    if (t.indexOf('kadın') > -1 || t.indexOf('kadin') > -1) teklifState.cinsiyet = 'kadin';
    else if (t.indexOf('erkek') > -1) teklifState.cinsiyet = 'erkek';
    else { addBot('Lütfen <b>Kadın</b> veya <b>Erkek</b> yazın.'); return; }
    teklifState.step = 'dogumyili';
    document.getElementById('input').placeholder = 'Doğum yılınızı yazın (örn: 1990)';
    addBot('Doğum yılınızı yazın (örnek: <b>1990</b>)');
    return;
  }
  if (teklifState.step === 'dogumyili') {
    var yil = parseInt(t);
    if (isNaN(yil) || yil < 1967 || yil > 2001) { addBot('Lütfen geçerli bir doğum yılı girin (1967–2001 arası).'); return; }
    teklifState.dogumYili = yil;
    teklifState.step = null;
    var placeholders = {tr:'Mesajınızı yazın...',en:'Type your message...',ru:'Введите сообщение...',de:'Nachricht eingeben...',fr:'Tapez votre message...',es:'Escribe tu mensaje...',it:'Scrivi il tuo messaggio...'};
  document.getElementById('input').placeholder = placeholders[lang] || placeholders['en'];
    showTeklifKart();
    return;
  }
}

      +'<th style="padding:7px 4px;font-size:10px;text-align:center;opacity:.8">AYLIK</th>'
      +'<th style="padding:7px 4px;font-size:10px;text-align:right;opacity:.8">12 YIL İADE</th>'
      +'</tr></thead><tbody>'+rows2+'</tbody></table></div>'
      +'<div style="background:rgba(255,255,255,.1);border-radius:8px;padding:10px;font-size:11px;opacity:.85;margin-bottom:8px">💡 Geçici lisans kaybında maks 30 ay, aylık teminat tutarının %2si ödenir.</div>'
      +'<div style="font-size:10px;opacity:.6">Viennalife Sigorta · Tek yetkili aracı: 7 Days Sigorta</div></div>';
  }

  var el = document.createElement('div');
  el.className = 'msg bot';
  el.innerHTML = '<div class="msg-av"><img src="/images.png" alt="Nova"/></div><div class="msg-bubble" style="padding:8px;background:transparent;border:none">'+html+'</div>';
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  teklifState = null;
  setTimeout(function() { addBot('Teklif kartınız hazır! 👆<br><br>Detaylı bilgi veya poliçe başlatmak için 7 Days Sigorta ile iletişime geçebilirsiniz.'); }, 300);
}
