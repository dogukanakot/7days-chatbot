<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>7 Days — Nova AI Asistan</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }
    .chat-wrap {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      height: 720px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      background: #fff;
    }
    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: #003366;
      flex-shrink: 0;
    }
    .logo-icon {
      width: 42px; height: 42px;
      border-radius: 8px;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-icon img { width: 38px; height: 38px; object-fit: contain; }
    .logo-name { font-size: 15px; font-weight: 700; color: #fff; }
    .logo-sub  { font-size: 10px; color: #a0b8d4; text-transform: uppercase; letter-spacing: 1px; }
    .online-badge {
      margin-left: auto;
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.12);
      border-radius: 20px; padding: 4px 10px;
    }
    .online-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
    .online-label { font-size: 11px; color: #fff; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* BRAND TABS */
    .brand-tabs {
      display: flex;
      background: #001f3f;
      flex-shrink: 0;
    }
    .brand-tab {
      flex: 1; padding: 8px 4px;
      font-size: 10px; font-weight: 600;
      color: rgba(255,255,255,0.5);
      background: transparent; border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      text-align: center;
      letter-spacing: 0.3px;
    }
    .brand-tab.active { color: #fff; border-bottom-color: #e8b800; }
    .brand-tab:hover:not(.active) { color: rgba(255,255,255,0.8); }

    /* DEPT TABS */
    .dept-tabs {
      display: flex;
      background: #f0f4f8;
      border-bottom: 1px solid #e2e8f0;
      flex-shrink: 0;
      overflow-x: auto;
    }
    .dept-tab {
      flex: 1; padding: 8px 4px;
      font-size: 10px; font-weight: 500;
      color: #6b7c93;
      background: transparent; border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      white-space: nowrap;
      display: flex; align-items: center; justify-content: center; gap: 3px;
    }
    .dept-tab.active { color: #003366; border-bottom-color: #003366; background: #fff; }
    .dept-tab:hover:not(.active) { background: #e2e8f0; }

    /* MESSAGES */
    .chat-messages {
      flex: 1; overflow-y: auto;
      padding: 14px 16px;
      display: flex; flex-direction: column; gap: 10px;
      background: #f7f9fc;
    }
    .msg { display: flex; gap: 8px; max-width: 90%; animation: fadeUp 0.18s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
    .msg.bot  { align-self: flex-start; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-av {
      width: 28px; height: 28px; border-radius: 50%;
      background: #003366;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 2px;
    }
    .msg-av i { color: #fff; font-size: 13px; }
    .msg.user .msg-av { background: #e8f0fe; }
    .msg.user .msg-av i { color: #003366; }
    .msg-bubble {
      padding: 9px 13px; border-radius: 14px;
      font-size: 13px; line-height: 1.6;
      color: #1a2332;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-bottom-left-radius: 3px;
    }
    .msg.user .msg-bubble {
      background: #003366; color: #fff;
      border-color: transparent;
      border-bottom-right-radius: 3px;
      border-bottom-left-radius: 14px;
    }
    .typing { display: flex; gap: 4px; padding: 8px 4px; align-items: center; }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: #93aac5; animation: bounce 1.1s infinite;
    }
    .typing span:nth-child(2){animation-delay:.18s}
    .typing span:nth-child(3){animation-delay:.36s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

    /* QUICK REPLIES */
    .qr-area {
      padding: 6px 14px 8px;
      display: flex; gap: 5px; flex-wrap: wrap;
      background: #f7f9fc;
      border-top: 1px solid #e2e8f0;
      flex-shrink: 0;
      max-height: 100px;
      overflow-y: auto;
    }
    .qr-btn {
      font-size: 11px; padding: 5px 10px;
      border-radius: 20px;
      border: 1px solid #003366;
      background: transparent; color: #003366;
      cursor: pointer; font-family: inherit;
      transition: all 0.12s;
    }
    .qr-btn:hover { background: #003366; color: #fff; }
    .qr-btn.active { background: #003366; color: #fff; }

    /* INPUT */
    .lang-row {
      display: flex; justify-content: flex-end;
      padding: 6px 14px 0;
      background: #fff;
      flex-shrink: 0;
    }
    .chat-lang {
      font-size: 11px; padding: 4px 8px;
      border: 1px solid #e2e8f0; border-radius: 8px;
      background: #f7f9fc; color: #1a2332;
      cursor: pointer; flex-shrink: 0;
    }
    .chat-input-row {
      display: flex; gap: 8px; align-items: flex-end;
      padding: 8px 14px;
      border-top: 1px solid #e2e8f0;
      background: #fff;
      flex-shrink: 0;
    }
    .chat-input-row.hidden { display: none; }
    .chat-input {
      flex: 1; resize: none; min-height: 36px; max-height: 90px;
      border: 1px solid #e2e8f0; border-radius: 18px;
      padding: 8px 14px; font-size: 13px;
      line-height: 1.4; font-family: inherit;
      color: #1a2332; background: #f7f9fc;
      outline: none; overflow-y: auto;
      transition: border-color 0.15s;
    }
    .chat-input:focus { border-color: #003366; }
    .chat-input::placeholder { color: #94a3b8; }
    .send-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: #003366; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s, transform 0.1s;
    }
    .send-btn:hover { background: #002244; }
    .send-btn:active { transform: scale(0.94); }
    .send-btn i { color: #fff; font-size: 15px; }
    .send-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
    .disclaimer {
      font-size: 10px; color: #94a3b8;
      text-align: center; padding: 3px 16px 6px;
      background: #fff; flex-shrink: 0;
    }
  </style>
</head>
<body>

<div class="chat-wrap">

  <!-- HEADER -->
  <div class="chat-header">
    <div class="logo-icon">
      <img id="header-logo" src="/images.png" alt="7 Days" />
    </div>
    <div>
      <div class="logo-name" id="header-name">7 Days Sigorta</div>
      <div class="logo-sub" id="header-sub">Aracılık Hizmetleri A.Ş.</div>
    </div>
    <div class="online-badge">
      <div class="online-dot"></div>
      <span class="online-label">Nova çevrimiçi</span>
    </div>
  </div>

  <!-- BRAND TABS -->
  <div class="brand-tabs">
    <button class="brand-tab active" onclick="switchBrand('sigorta',this)">🛡️ 7 Days Sigorta</button>
    <button class="brand-tab" onclick="switchBrand('havacilik',this)">✈️ 7 Days Havacılık</button>
    <button class="brand-tab" onclick="switchBrand('akademi',this)">🎓 7 Days Akademi</button>
  </div>

  <!-- DEPT TABS -->
  <div class="dept-tabs" id="dept-tabs"></div>

  <!-- MESSAGES -->
  <div class="chat-messages" id="messages"></div>
  <div class="qr-area" id="qr-area"></div>

  <div class="lang-row">
    <select class="chat-lang" id="lang" onchange="switchLang()">
      <option value="tr">🇹🇷 TR</option>
      <option value="en">🇬🇧 EN</option>
    </select>
  </div>

  <div class="chat-input-row hidden" id="input-row">
    <textarea class="chat-input" id="input" rows="1"
      placeholder="Mesajınızı yazın..."
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <i class="ti ti-send"></i>
    </button>
  </div>

  <div class="disclaimer">
    Bu asistan bilgi amaçlıdır. Detaylı bilgi için 7 Days yetkilileriyle iletişime geçiniz.
  </div>
</div>

function switchBrand(b, btn) {
  brand = b;
  document.querySelectorAll('.brand-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  dept = Object.keys(BRANDS[brand].depts)[0];
  selectedProduct = null;
  history = [];
  hideInput();

  // Logo, isim, renk güncelle
  const meta = BRAND_META[brand];
  document.getElementById('header-logo').src = meta.logo;
  document.getElementById('header-name').textContent = meta.name;
  document.getElementById('header-sub').textContent = meta.sub;
  document.querySelector('.chat-header').style.background = meta.bg;

  renderDeptTabs();
  renderQR();
  document.getElementById('messages').innerHTML = '';
  const d = BRANDS[brand].depts[dept];
  addBot(d.greet[lang]);
}

function switchDept(d, btn) {
  dept = d;
  selectedProduct = null;
  history = [];
  document.querySelectorAll('.dept-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('messages').innerHTML = '';
  hideInput();
  renderQR();
  addBot(BRANDS[brand].depts[dept].greet[lang]);
}

function switchLang() {
  lang = document.getElementById('lang').value;
  document.getElementById('input').placeholder = lang === 'tr' ? 'Mesajınızı yazın...' : 'Type your message...';
  history = [];
  selectedProduct = null;
  document.getElementById('messages').innerHTML = '';
  hideInput();
  renderQR();
  addBot(BRANDS[brand].depts[dept].greet[lang]);
}

function renderDeptTabs() {
  const tabsEl = document.getElementById('dept-tabs');
  tabsEl.innerHTML = '';
  const depts = BRANDS[brand].depts;
  Object.keys(depts).forEach((key, i) => {
    const btn = document.createElement('button');
    btn.className = 'dept-tab' + (key === dept ? ' active' : '');
    btn.textContent = depts[key].label[lang];
    btn.onclick = () => switchDept(key, btn);
    tabsEl.appendChild(btn);
  });
}

// QUICK REPLIES
// ═══════════════════════════════════════════════
function renderQR() {
  const area = document.getElementById('qr-area');
  area.innerHTML = '';
  const d = BRANDS[brand].depts[dept];
  const replies = d.qr[lang];
  replies.forEach(r => {
    const b = document.createElement('button');
    b.className = 'qr-btn' + (selectedProduct === r ? ' active' : '');
    b.textContent = r;
    b.onclick = () => handleQR(r, b);
    area.appendChild(b);
  });
}

function handleQR(text, btn) {
  const isQuote = text.toLowerCase().includes('teklif') || text.toLowerCase().includes('quote');
  if (isQuote) {
    // Uçuş ekibi sekmesinde teklif flow başlat
    if (dept === 'pilot') {
      startTeklifFlow();
      return;
    }
    showInput();
  }

  // Hasar product selection — lisans kaybı ve trafik için input aç
  if (dept === 'hasar') {
    const d = BRANDS.sigorta.depts.hasar;
    const openInputBtns = d.openInput || [];
    if (openInputBtns.includes(text)) { showInput(); }
    const products = d.products ? d.products[lang] : null;
    if (products && Object.keys(products).includes(text)) {
      selectedProduct = text;
      renderQR();
      addUser(text);
      history.push({ role: 'user', content: text });
      sendWithExtra(text, products[text]);
      return;
    }
  }

  // Akademi egitimler product selection
  if (brand === 'akademi' && dept === 'egitimler') {
    const products = BRANDS.akademi.depts.egitimler.products[lang];
    if (products && Object.keys(products).includes(text)) {
      selectedProduct = text;
      renderQR();
      addUser(text);
      history.push({ role: 'user', content: text });
      sendWithExtra(text, products[text]);
      return;
    }
  }

  // Elementer product selection
  if (dept === 'elementer') {
    const products = BRANDS.sigorta.depts.elementer.products[lang];
    if (products && Object.keys(products).includes(text)) {
      selectedProduct = text;
      renderQR();
      addUser(text);
      history.push({ role: 'user', content: text });
      sendWithExtra(text, products[text]);
      return;
    }
  }

  send(text);
}

function addBot(text) {

}

  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg bot'; d.id = 'typing';
  d.innerHTML = `<div class="msg-av"><i class="ti ti-robot"></i></div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;

// API CALLS
// ═══════════════════════════════════════════════
function getSystemPrompt() {
  const d = BRANDS[brand].depts[dept];
  if (dept === 'elementer') {
    return d.system(lang, selectedProduct ? BRANDS.sigorta.depts.elementer.products[lang][selectedProduct] : '');
  }
  if (brand === 'akademi' && dept === 'egitimler') {
    return d.system(lang, selectedProduct ? BRANDS.akademi.depts.egitimler.products[lang][selectedProduct] : '');
  }
  return d.system(lang);
}

async function sendWithExtra(text, extra) {
  if (busy) return;
  busy = true;
  document.getElementById('send-btn').disabled = true;
  showTyping();
  const sysPrompt = `${getSystemPrompt()}\n\nKULLANICI BU ÜRÜNÜ SEÇTI - DETAYLI ANLAT:\n${extra}`;
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        max_tokens: 1000,
        system: sysPrompt,
        messages: [{ role: 'user', content: text }]
      })
    });
    const data = await res.json();
    const reply = data.content.map(b => b.text || '').join('');
    history.push({ role: 'assistant', content: reply });
    removeTyping();
    addBot(reply);
  } catch(e) {
    removeTyping();
    addBot(lang === 'tr' ? 'Üzgünüm, bir hata oluştu.' : 'Sorry, an error occurred.');
  }
  busy = false;
  document.getElementById('send-btn').disabled = false;
}

async function send(text) {
  if (busy || !text.trim()) return;
  busy = true;
  document.getElementById('send-btn').disabled = true;
  addUser(text);
  history.push({ role: 'user', content: text });
  showTyping();
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        max_tokens: 1000,
        system: getSystemPrompt(),
        messages: history
      })
    });
    const data = await res.json();
    const reply = data.content.map(b => b.text || '').join('');
    history.push({ role: 'assistant', content: reply });
    removeTyping();
    addBot(reply);
  } catch(e) {
    removeTyping();
    addBot(lang === 'tr' ? 'Üzgünüm, bir hata oluştu. Lütfen tekrar deneyin.' : 'Sorry, an error occurred. Please try again.');
  }
  busy = false;
  document.getElementById('send-btn').disabled = false;
}

function sendMessage() {
  const inp = document.getElementById('input');
  const t = inp.value.trim();
  if (!t) return;
  inp.value = ''; autoResize(inp);

  // Teklif flow aktifse oraya yönlendir
  if (teklifState && teklifState.step) {
    addUser(t);
    handleTeklifInput(t);
    return;
  }

  send(t);
}

function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 90) + 'px';
}

// TEKLİF FLOW STATE

let teklifState = null; // {step, meslek, cinsiyet, dogumYili}

function startTeklifFlow() {
  teklifState = { step: 'meslek' };
  showInput();
  document.getElementById('input').placeholder = 'Pilot / Kabin / Teknik yazın...';
  showTeklifPrompt('Harika! Size özel fiyat teklifi hazırlayalım.\n\nMesleğinizi seçin:\n🛩️ <b>Pilot</b>\n✈️ <b>Kabin</b>\n🔧 <b>Teknik</b>');
}

function showTeklifPrompt(html) {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg bot';
  d.innerHTML = `<div class="msg-av"><i class="ti ti-robot"></i></div><div class="msg-bubble">${html}</div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function handleTeklifInput(text) {
  const t = text.trim().toLowerCase();

  if (teklifState.step === 'meslek') {
    if (t.includes('pilot')) {
      teklifState.meslek = 'pilot';
    } else if (t.includes('kabin') || t.includes('teknik')) {
      teklifState.meslek = 'kabin';
    } else {
      showTeklifPrompt('Lütfen <b>Pilot</b>, <b>Kabin</b> veya <b>Teknik</b> yazın.');
      return;
    }
    teklifState.step = 'cinsiyet';
    document.getElementById('input').placeholder = 'Kadın / Erkek yazın...';
    showTeklifPrompt('Cinsiyetiniz nedir?\n👩 <b>Kadın</b>\n👨 <b>Erkek</b>');
    return;
  }

  if (teklifState.step === 'cinsiyet') {
    if (t.includes('kadın') || t.includes('kadin') || t.includes('k')) {
      teklifState.cinsiyet = 'kadin';
    } else if (t.includes('erkek') || t.includes('e')) {
      teklifState.cinsiyet = 'erkek';
    } else {
      showTeklifPrompt('Lütfen <b>Kadın</b> veya <b>Erkek</b> yazın.');
      return;
    }
    teklifState.step = 'dogumyili';
    document.getElementById('input').placeholder = 'Doğum yılınızı yazın (örn: 1990)';
    showTeklifPrompt('Doğum yılınızı yazın (örnek: <b>1990</b>)');
    return;
  }

  if (teklifState.step === 'dogumyili') {
    const yil = parseInt(t);
    if (isNaN(yil) || yil < 1965 || yil > 2002) {
      showTeklifPrompt('Lütfen geçerli bir doğum yılı girin (1967–2001 arası).');
      return;
    }
    teklifState.dogumYili = yil;
    teklifState.step = null;
    document.getElementById('input').placeholder = lang === 'tr' ? 'Mesajınızı yazın...' : 'Type your message...';
    showTeklifKart();
    return;
  }
}
