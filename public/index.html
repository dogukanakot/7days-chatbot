<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>7 Days Sigorta — Nova AI Asistan</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }
    .chat-wrap {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      height: 680px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      background: #fff;
    }
    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: #003366;
      flex-shrink: 0;
    }
    .logo-icon {
      width: 42px; height: 42px;
      border-radius: 8px;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-name { font-size: 15px; font-weight: 700; color: #fff; }
    .logo-sub  { font-size: 10px; color: #a0b8d4; text-transform: uppercase; letter-spacing: 1px; }
    .online-badge {
      margin-left: auto;
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.12);
      border-radius: 20px; padding: 4px 10px;
    }
    .online-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
    .online-label { font-size: 11px; color: #fff; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .dept-tabs {
      display: flex;
      background: #f0f4f8;
      border-bottom: 1px solid #e2e8f0;
      flex-shrink: 0;
      overflow-x: auto;
    }
    .dept-tab {
      flex: 1; padding: 9px 4px;
      font-size: 11px; font-weight: 500;
      color: #6b7c93;
      background: transparent; border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      white-space: nowrap;
      display: flex; align-items: center; justify-content: center; gap: 3px;
    }
    .dept-tab.active { color: #003366; border-bottom-color: #003366; background: #fff; }
    .dept-tab:hover:not(.active) { background: #e2e8f0; }
    .chat-messages {
      flex: 1; overflow-y: auto;
      padding: 14px 16px;
      display: flex; flex-direction: column; gap: 10px;
      background: #f7f9fc;
    }
    .msg { display: flex; gap: 8px; max-width: 88%; animation: fadeUp 0.18s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
    .msg.bot  { align-self: flex-start; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-av {
      width: 28px; height: 28px; border-radius: 50%;
      background: #003366;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 2px;
    }
    .msg-av i { color: #fff; font-size: 13px; }
    .msg.user .msg-av { background: #e8f0fe; }
    .msg.user .msg-av i { color: #003366; }
    .msg-bubble {
      padding: 9px 13px; border-radius: 14px;
      font-size: 13.5px; line-height: 1.55;
      color: #1a2332;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-bottom-left-radius: 3px;
    }
    .msg.user .msg-bubble {
      background: #003366; color: #fff;
      border-color: transparent;
      border-bottom-right-radius: 3px;
      border-bottom-left-radius: 14px;
    }
    .typing { display: flex; gap: 4px; padding: 8px 4px; align-items: center; }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: #93aac5; animation: bounce 1.1s infinite;
    }
    .typing span:nth-child(2){animation-delay:.18s}
    .typing span:nth-child(3){animation-delay:.36s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
    .qr-area {
      padding: 6px 14px 8px;
      display: flex; gap: 6px; flex-wrap: wrap;
      background: #f7f9fc;
      border-top: 1px solid #e2e8f0;
      flex-shrink: 0;
    }
    .qr-btn {
      font-size: 11.5px; padding: 5px 11px;
      border-radius: 20px;
      border: 1px solid #003366;
      background: transparent; color: #003366;
      cursor: pointer; font-family: inherit;
      transition: all 0.12s;
    }
    .qr-btn:hover { background: #003366; color: #fff; }
    .chat-input-row {
      display: flex; gap: 8px; align-items: flex-end;
      padding: 10px 14px;
      border-top: 1px solid #e2e8f0;
      background: #fff;
      flex-shrink: 0;
    }
    .chat-lang {
      font-size: 11px; padding: 5px 8px;
      border: 1px solid #e2e8f0; border-radius: 8px;
      background: #f7f9fc; color: #1a2332;
      cursor: pointer; flex-shrink: 0;
    }
    .chat-input {
      flex: 1; resize: none; min-height: 36px; max-height: 90px;
      border: 1px solid #e2e8f0; border-radius: 18px;
      padding: 8px 14px; font-size: 13.5px;
      line-height: 1.4; font-family: inherit;
      color: #1a2332; background: #f7f9fc;
      outline: none; overflow-y: auto;
      transition: border-color 0.15s;
    }
    .chat-input:focus { border-color: #003366; }
    .chat-input::placeholder { color: #94a3b8; }
    .send-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: #003366; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s, transform 0.1s;
    }
    .send-btn:hover { background: #002244; }
    .send-btn:active { transform: scale(0.94); }
    .send-btn i { color: #fff; font-size: 15px; }
    .send-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
    .disclaimer {
      font-size: 10.5px; color: #94a3b8;
      text-align: center; padding: 4px 16px 8px;
      background: #fff; flex-shrink: 0;
    }
  </style>
</head>
<body>

<div class="chat-wrap">

  <div class="chat-header">
    <div class="logo-icon">
      <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
        <rect width="30" height="30" rx="6" fill="#003366"/>
        <text x="15" y="12" text-anchor="middle" fill="#fff" font-size="8" font-weight="800" font-family="Arial">7</text>
        <text x="15" y="20" text-anchor="middle" fill="#fff" font-size="5" font-weight="600" font-family="Arial">DAYS</text>
        <text x="15" y="26" text-anchor="middle" fill="#e8b800" font-size="3.8" font-weight="600" font-family="Arial">SİGORTA</text>
      </svg>
    </div>
    <div>
      <div class="logo-name">7 Days Sigorta</div>
      <div class="logo-sub">Aracılık Hizmetleri A.Ş.</div>
    </div>
    <div class="online-badge">
      <div class="online-dot"></div>
      <span class="online-label">Nova çevrimiçi</span>
    </div>
  </div>

  <div class="dept-tabs">
    <button class="dept-tab active" onclick="switchDept('genel',this)">
      <i class="ti ti-message-circle"></i> Genel
    </button>
    <button class="dept-tab" onclick="switchDept('kasko',this)">
      <i class="ti ti-car"></i> Kasko & Trafik
    </button>
    <button class="dept-tab" onclick="switchDept('saglik',this)">
      <i class="ti ti-heart-rate-monitor"></i> Sağlık
    </button>
    <button class="dept-tab" onclick="switchDept('hasar',this)">
      <i class="ti ti-file-report"></i> Hasar
    </button>
    <button class="dept-tab" onclick="switchDept('pilot',this)">
      <i class="ti ti-plane"></i> Uçuş Ekibi
    </button>
  </div>

  <div class="chat-messages" id="messages"></div>
  <div class="qr-area" id="qr-area"></div>

  <div class="chat-input-row">
    <select class="chat-lang" id="lang" onchange="switchLang()">
      <option value="tr">🇹🇷 TR</option>
      <option value="en">🇬🇧 EN</option>
    </select>
    <textarea class="chat-input" id="input" rows="1"
      placeholder="Mesajınızı yazın..."
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <i class="ti ti-send"></i>
    </button>
  </div>

  <div class="disclaimer">
    Bu asistan bilgi amaçlıdır. Resmi teklifler için 7 Days Sigorta yetkilileriyle iletişime geçiniz.
  </div>
</div>

<script>
  const API_URL = '/api/chat';

  const DEPTS = {
    genel: {
      greet: {
        tr: "Merhaba! 👋 Ben Nova, 7 Days Sigorta'nın dijital asistanıyım.\n\n2013'ten bu yana Türkiye'nin en büyük sigorta şirketleriyle çalışıyoruz. Size nasıl yardımcı olabilirim?",
        en: "Hello! 👋 I'm Nova, the digital assistant of 7 Days Sigorta.\n\nSince 2013, we've partnered with Turkey's largest insurers. How can I help you today?"
      },
      system: (lang) => `You are Nova, the professional AI assistant of 7 Days Sigorta ve Aracılık Hizmetleri A.Ş., a leading insurance brokerage in Turkey since 2013.
Company: 7 Days Sigorta ve Aracılık Hizmetleri A.Ş.
Address: Mimar Sinan Caddesi No:148/1A, Barbaros Mahallesi, Ataşehir, Istanbul
Hours: 7 days a week, 09:00-18:00 | Website: www.7dayssigorta.com
Branches: Istanbul (Merkez), Balikesir
Services: Trafik Sigortasi, Kasko, Rent A Car Kasko, Saglik Sigortasi, Konut Sigortasi, Yangin Sigortasi, Hayat Sigortasi, Ferdi Kaza, Seyahat Sigortasi, Ucus Ekibi Sigortasi (Pilot, Kabin Ekibi, Teknik Muhendis)
Key advantages: Agency-exclusive discounts, 6 installment payments, no-claim bonus refund, free consulting, works with ALL major Turkish insurers.
Be professional, warm, concise. Never give legal guarantees. For pricing, recommend getting a quote.
${lang === 'en' ? 'Respond in English.' : 'Respond in Turkish.'}`,
      qr: {
        tr: ['Hizmetlerimiz neler?', 'Teklif almak istiyorum', 'İletişim bilgileri', 'Hasar nasıl bildirilir?'],
        en: ['What services do you offer?', 'I want a quote', 'Contact info', 'How to file a claim?']
      }
    },
    kasko: {
      greet: {
        tr: "Merhaba! 🚗 Kasko ve Trafik Sigortası konusunda size yardımcı olmak için buradayım. Ne öğrenmek istersiniz?",
        en: "Hello! 🚗 I'm here to help you with Kasko and Traffic Insurance. What would you like to know?"
      },
      system: (lang) => `You are Nova, auto insurance specialist at 7 Days Sigorta.
Products:
1. ZORUNLU TRAFIK SIGORTASI: Legally required for all vehicles. Covers third-party bodily injury and property damage. 6 installment payment. Annual renewal required.
2. KASKO SIGORTASI: Optional comprehensive coverage. Covers collision, theft, fire, natural disasters, vandalism, glass. Types: Full Kasko, Mini Kasko, Pert Kasko. No-claim bonus on renewal.
3. RENT A CAR KASKO: Fleet coverage for rental companies. Free towing included. Long-term rentals include replacement vehicle.
Always recommend getting a quote at 7dayssigorta.com.
${lang === 'en' ? 'Respond in English.' : 'Respond in Turkish.'}`,
      qr: {
        tr: ['Kasko ile trafik farkı?', 'Kasko teklifi istiyorum', 'Rent A Car kasko', 'Hasarsızlık indirimi'],
        en: ['Kasko vs Trafik?', 'Get a kasko quote', 'Rent A Car coverage', 'No-claim bonus']
      }
    },
    saglik: {
      greet: {
        tr: "Merhaba! 💙 Sağlık Sigortası konusunda size yardımcı olmaya hazırım. Ne sormak istersiniz?",
        en: "Hello! 💙 I'm ready to help you with Health Insurance. What would you like to know?"
      },
      system: (lang) => `You are Nova, health insurance specialist at 7 Days Sigorta.
Products:
1. SAGLIK SIGORTASI: Individual and family plans. Complementary (Tamamlayici) plans for SGK holders. Access to private hospitals. 6 installments.
2. FERDI KAZA: Covers accidental death, permanent/temporary disability. Optional unemployment and legal protection add-ons.
3. HAYAT SIGORTASI: Term and whole life options. Family financial protection.
4. SEYAHAT SIGORTASI: Required for Schengen visa. Covers medical emergencies abroad, trip cancellation, lost luggage. Single and annual plans.
Never give specific medical advice. Recommend consulting an agent for pre-existing conditions.
${lang === 'en' ? 'Respond in English.' : 'Respond in Turkish.'}`,
      qr: {
        tr: ['Sağlık sigortası fiyatları', 'Tamamlayıcı sağlık nedir?', 'Seyahat sigortası', 'Ferdi kaza sigortası'],
        en: ['Health insurance pricing', 'Complementary health?', 'Travel insurance', 'Personal accident']
      }
    },
    hasar: {
      greet: {
        tr: "Merhaba. Hasar bildirimi konusunda size yardımcı olmak için buradayım. Yaşadığınız durumdan dolayı üzgünüm. Poliçe numaranızı paylaşabilir misiniz?",
        en: "Hello. I'm here to help with your claim. I'm sorry to hear about your situation. Could you share your policy number?"
      },
      system: (lang) => `You are Nova, claims specialist at 7 Days Sigorta. Be empathetic and professional.
Claims process:
1. Notify 7 Days Sigorta immediately after incident
2. For traffic accidents: get police/accident report if needed
3. For theft: file police report immediately
4. Provide: policy number, incident date, description, photos
5. Claims reviewed within 24 hours, resolved within 7 business days
For auto: exchange info, take photos, don't move vehicles for injury accidents.
For home: document damage with photos, keep damaged items for inspection.
For health: keep all receipts and reports, submit within policy deadline.
${lang === 'en' ? 'Respond in English.' : 'Respond in Turkish.'}`,
      qr: {
        tr: ['Trafik kazası bildirimi', 'Konut hasarı', 'Sağlık talebi', 'Süreç ne kadar sürer?'],
        en: ['Traffic accident claim', 'Home damage', 'Health claim', 'How long does it take?']
      }
    },
    pilot: {
      greet: {
        tr: "Merhaba! ✈️ 7 Days Sigorta olarak uçuş ekiplerine özel sigorta çözümleri sunuyoruz. Size nasıl yardımcı olabilirim?",
        en: "Hello! ✈️ 7 Days Sigorta offers special insurance solutions for flight crews. How can I assist you?"
      },
      system: (lang) => `You are Nova, flight crew insurance specialist at 7 Days Sigorta.
UCUS EKIBI SIGORTALARI:
1. PILOT KORUMA SIGORTASI:
- Kapsam: Lisans kaybı (tıbbi nedenler), kalıcı maluliyet, kazara ölüm, geçici maluliyet, hukuki koruma
- Yıllık poliçe, 6 taksit imkanı
- Türkiye genelinde geçerli

2. KABIN EKIBI SIGORTASI:
- Tüm kabin görevlileri (hostes/steward) ve uçuş ekibi için geçerlidir
- Kapsam: iş kazası, maluliyet, hayat sigortası, hastalık tazminatı
- Yıllık poliçe, 6 taksit imkanı

3. TEKNIK MUHENDIS SIGORTASI:
- Uçak bakım ve teknik personeli için özel sigorta
- Kapsam: iş kazası, mesleki sorumluluk, maluliyet, hayat sigortası
- Yıllık poliçe, 6 taksit imkanı

For all policies: pre-existing medical conditions should be checked with agent. Always recommend speaking with a 7 Days Sigorta agent for detailed information and quotes.
${lang === 'en' ? 'Respond in English.' : 'Respond in Turkish.'}`,
      qr: {
        tr: ['Pilot sigortası', 'Kabin ekibi sigortası', 'Teknik mühendis sigortası', 'Teklif almak istiyorum'],
        en: ['Pilot insurance', 'Cabin crew insurance', 'Technical engineer insurance', 'Request a quote']
      }
    }
  };

  let dept = 'genel', lang = 'tr', history = [], busy = false;

  function switchDept(d, btn) {
    dept = d; history = [];
    document.querySelectorAll('.dept-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('messages').innerHTML = '';
    renderQR();
    addBot(DEPTS[dept].greet[lang]);
  }

  function switchLang() {
    lang = document.getElementById('lang').value;
    document.getElementById('input').placeholder = lang === 'tr' ? 'Mesajınızı yazın...' : 'Type your message...';
    history = [];
    document.getElementById('messages').innerHTML = '';
    renderQR();
    addBot(DEPTS[dept].greet[lang]);
  }

  function renderQR() {
    const area = document.getElementById('qr-area');
    area.innerHTML = '';
    DEPTS[dept].qr[lang].forEach(r => {
      const b = document.createElement('button');
      b.className = 'qr-btn'; b.textContent = r;
      b.onclick = () => send(r);
      area.appendChild(b);
    });
  }

  function addBot(text) {
    const msgs = document.getElementById('messages');
    const d = document.createElement('div');
    d.className = 'msg bot';
    d.innerHTML = `<div class="msg-av"><i class="ti ti-robot"></i></div><div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div>`;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addUser(text) {
    const msgs = document.getElementById('messages');
    const d = document.createElement('div');
    d.className = 'msg user';
    d.innerHTML = `<div class="msg-av"><i class="ti ti-user"></i></div><div class="msg-bubble">${text}</div>`;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const d = document.createElement('div');
    d.className = 'msg bot'; d.id = 'typing';
    d.innerHTML = `<div class="msg-av"><i class="ti ti-robot"></i></div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() { const el = document.getElementById('typing'); if(el) el.remove(); }

  async function send(text) {
    if (busy || !text.trim()) return;
    busy = true;
    document.getElementById('send-btn').disabled = true;
    addUser(text);
    history.push({ role: 'user', content: text });
    showTyping();
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          max_tokens: 1000,
          system: DEPTS[dept].system(lang),
          messages: history
        })
      });
      const data = await res.json();
      const reply = data.content.map(b => b.text || '').join('');
      history.push({ role: 'assistant', content: reply });
      removeTyping();
      addBot(reply);
    } catch(e) {
      removeTyping();
      addBot(lang === 'tr' ? 'Üzgünüm, bir hata oluştu. Lütfen tekrar deneyin.' : 'Sorry, an error occurred. Please try again.');
    }
    busy = false;
    document.getElementById('send-btn').disabled = false;
  }

  function sendMessage() {
    const inp = document.getElementById('input');
    const t = inp.value.trim();
    if (!t) return;
    inp.value = ''; autoResize(inp); send(t);
  }

  function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 90) + 'px';
  }

  renderQR();
  addBot(DEPTS[dept].greet[lang]);
</script>

</body>
</html>
